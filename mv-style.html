<script>
const STYLES = {
  cinema: {
    name: '🎞️ 电影胶片风',
    desc: '画面厚重、暗调、Anamorphic 横向变形镜头，叙事节奏舒缓，适合喜欢《海上花》《花样年华》《情书》气质的新人。镜头多用长焦中景，回避大特写，靠空镜与环境讲故事。',
    specs: { '分辨率':'4K · 24fps', '机身':'电影机 / RED / ARRI', '色调':'暗调 · 高对比', '配乐':'弦乐 / 极简钢琴', '长度':'4–6 分钟', '价格档':'¥15,000+' }
  },
  cream: {
    name: '🥐 奶油色调风',
    desc: '高调、低饱和、暖白基底。氛围松弛温柔，社交媒体传播效率最高，是 2024–2026 年小红书最主流的婚礼影像风格。',
    specs: { '分辨率':'4K · 30fps', '机身':'微单 / Sony A7M4', '色调':'高调 · 低饱和暖白', '配乐':'轻流行 / 民谣', '长度':'3–4 分钟', '价格档':'¥8,000–15,000' }
  },
  hk: {
    name: '🎥 港风复古',
    desc: '颗粒感、青橙、4:3 画幅，带 80–90 年代港片质感。文字字幕模仿老港片排版，是非常出片、辨识度极高的小众选择。',
    specs: { '分辨率':'4K downscale', '机身':'CCD 模拟 / 微单+滤镜', '色调':'青橙 · 高颗粒', '配乐':'粤语金曲', '长度':'3–5 分钟', '价格档':'¥10,000–18,000' }
  },
  doc: {
    name: '📷 纪录直出风',
    desc: '手持、自然光、最小调色，强调真实情绪。适合不喜欢摆拍、希望影片像"被偷看的回忆"的新人。预算友好。',
    specs: { '分辨率':'1080p–4K', '机身':'微单手持', '色调':'自然色', '配乐':'人声原音 + 轻配乐', '长度':'5–8 分钟', '价格档':'¥4,000–10,000' }
  }
};
const QUESTIONS = [
  { q:'你最希望婚礼影片让人想起的电影是？',
    opts:[
      {t:'王家卫《花样年华》/《重庆森林》',v:'cinema'},
      {t:'《La La Land》/《星运里的错》',v:'cream'},
      {t:'《阿飞正传》/《英雄本色》',v:'hk'},
      {t:'纪录片《是枝裕和》系列',v:'doc'},
    ]},
  { q:'你希望影片的色调更偏向？',
    opts:[
      {t:'暗调、电影感、低光华丽',v:'cinema'},
      {t:'高调、奶油白、温柔松弛',v:'cream'},
      {t:'青橙、高对比、复古颗粒',v:'hk'},
      {t:'自然色、最小调色',v:'doc'},
    ]},
  { q:'仪式现场你更倾向？',
    opts:[
      {t:'灯光精心布置、追求电影感',v:'cinema'},
      {t:'户外草坪 / 大窗自然光',v:'cream'},
      {t:'有怀旧元素的室内（旧礼堂/中餐厅）',v:'hk'},
      {t:'家庭式、小型、不刻意布置',v:'doc'},
    ]},
  { q:'更喜欢哪类配乐？',
    opts:[
      {t:'弦乐 / 极简钢琴',v:'cinema'},
      {t:'轻流行 / 民谣',v:'cream'},
      {t:'粤语金曲 / 老歌',v:'hk'},
      {t:'人声原音 + 极少配乐',v:'doc'},
    ]},
  { q:'希望影片的长度大约？',
    opts:[
      {t:'4–6 分钟（电影预告片节奏）',v:'cinema'},
      {t:'3–4 分钟（短平快好分享）',v:'cream'},
      {t:'3–5 分钟（突出复古字幕）',v:'hk'},
      {t:'5–8 分钟（更完整的叙事）',v:'doc'},
    ]},
  { q:'对预算的态度？',
    opts:[
      {t:'追求顶级品质，¥15,000 以上可接受',v:'cinema'},
      {t:'¥8,000–15,000 之间最合适',v:'cream'},
      {t:'愿意为独特风格多花一点',v:'hk'},
      {t:'希望性价比最高，¥10,000 以下',v:'doc'},
    ]},
];

let idx=0, scores={cinema:0,cream:0,hk:0,doc:0};
const quiz = document.getElementById('quiz');
const bar = document.getElementById('bar');
function render(){
  if(idx>=QUESTIONS.length){ return show(); }
  const q = QUESTIONS[idx];
  bar.style.width = (idx/QUESTIONS.length*100)+'%';
  quiz.innerHTML = '<div class="q"><div class="qno">题目 '+(idx+1)+' / '+QUESTIONS.length+'</div>'+
    '<div class="qt">'+q.q+'</div><div class="opts">'+
    q.opts.map((o,i)=>'<button data-v="'+o.v+'">'+o.t+'</button>').join('')+
    '</div></div>';
  quiz.querySelectorAll('button').forEach(b=>b.onclick=()=>{ scores[b.dataset.v]+=1; idx++; render(); });
}
function show(){
  bar.style.width='100%';
  quiz.innerHTML='';
  const winner = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
  const s = STYLES[winner];
  document.getElementById('r-name').textContent = s.name;
  document.getElementById('r-desc').textContent = s.desc;
  document.getElementById('r-specs').innerHTML = Object.entries(s.specs).map(([k,v])=>'<div><strong>'+k+'：</strong>'+v+'</div>').join('');
  document.getElementById('result').classList.add('show');
  document.getElementById('result').dataset.style = winner;
}
function restart(){ idx=0; scores={cinema:0,cream:0,hk:0,doc:0}; document.getElementById('result').classList.remove('show'); render(); }
function copyResult(){
  const name = document.getElementById('r-name').textContent;
  navigator.clipboard.writeText('我的婚礼MV风格是：'+name+' — via wedding-tv.cn/mv-style.html');
  alert('已复制');
}
function shareResult(){
  const name = document.getElementById('r-name').textContent;
  if(navigator.share) navigator.share({title:'我的婚礼MV风格',text:name,url:location.href});
  else { navigator.clipboard.writeText(location.href); alert('链接已复制'); }
}
render();
</script>
