<script>
// 各类型的表单字段定义
const KINDS = {
  toast: {
    label: "🥂 敬酒词", title: "你的敬酒词", btn: "✨ 生成敬酒词",
    fields: [
      { row: [
        { id: "speaker", label: "你的名字 / 身份", placeholder: "例：张伟" },
        { id: "relation", label: "与新人的关系", placeholder: "例：新郎大学室友" },
      ]},
      { id: "couple", label: "新人姓名", placeholder: "例：王明 & 李娜" },
      { id: "story", label: "想分享的故事/印象 *", type: "textarea", placeholder: "例：我们是大学四年的室友，他大一就追李娜追了三年，今天终于把她娶回家。" },
      { id: "mood", label: "情绪基调", type: "select", options: ["温暖真挚","幽默轻松","正式得体","感人煽情"] },
    ],
  },
  host: {
    label: "🎤 司仪开场", title: "你的开场白", btn: "✨ 生成开场白",
    fields: [
      { id: "couple", label: "新人姓名", placeholder: "例：王明 & 李娜" },
      { id: "venue", label: "婚礼场地", placeholder: "例：上海外滩源宴会厅" },
      { id: "style", label: "婚礼风格", type: "select", options: ["浪漫西式","中式古典","户外草坪","简约现代","海边婚礼","教堂婚礼"] },
      { id: "highlights", label: "想突出的亮点 *", type: "textarea", placeholder: "例：新人是青梅竹马，今天父母都从老家赶来，新娘的父亲会亲手把女儿交到新郎手上。" },
    ],
  },
  parents: {
    label: "👨‍👩‍👧 父母致辞", title: "父母致辞", btn: "✨ 生成致辞",
    fields: [
      { id: "side", label: "发言方", type: "select", options: ["新娘父亲","新娘母亲","新郎父亲","新郎母亲"] },
      { row: [
        { id: "child", label: "自己孩子的名字", placeholder: "例：李娜" },
        { id: "partner", label: "伴侣（女婿/儿媳）名字", placeholder: "例：王明" },
      ]},
      { id: "story", label: "想分享的成长往事 *", type: "textarea", placeholder: "例：娜娜从小爱跳舞，高三放弃艺考选了医学，去年终于成了主治医师。" },
      { id: "hope", label: "对小两口的期盼", placeholder: "例：希望他们互相搀扶、有商有量。" },
    ],
  },
  bestman: {
    label: "👨‍🦱 伴郎伴娘", title: "伴郎/伴娘致辞", btn: "✨ 生成致辞",
    fields: [
      { row: [
        { id: "role", label: "角色", type: "select", options: ["伴郎","伴娘"] },
        { id: "speaker", label: "你的名字", placeholder: "例：陈强" },
      ]},
      { id: "friend", label: "好友（新人之一）名字", placeholder: "例：王明" },
      { id: "story", label: "想讲的故事/共同回忆 *", type: "textarea", placeholder: "例：大学一起打篮球受伤、一起准备求职面试、看着他从'母胎单身'到今天娶到女神。" },
      { id: "joke", label: "可以带一点的玩笑/梗（可选）", placeholder: "例：他第一次表白用的是知乎复制的稿子" },
    ],
  },
  proposal: {
    label: "💍 求婚词", title: "你的求婚词", btn: "✨ 生成求婚词",
    fields: [
      { row: [
        { id: "me", label: "你的名字", placeholder: "例：王明" },
        { id: "partner", label: "TA 的名字", placeholder: "例：李娜" },
      ]},
      { id: "story", label: "你们的共同故事 *", type: "textarea", placeholder: "例：四年异地，每月只能见两次，今年终于在上海买了我们的小家。" },
      { row: [
        { id: "place", label: "求婚地点", placeholder: "例：外滩、初遇的咖啡馆" },
        { id: "style", label: "风格", type: "select", options: ["深情","浪漫","简短直接","幽默"] },
      ]},
    ],
  },
  anniversary: {
    label: "💝 周年纪念", title: "周年纪念文案", btn: "✨ 生成文案",
    fields: [
      { row: [
        { id: "years", label: "已结婚多少年", placeholder: "例：5", type: "number" },
        { id: "partner", label: "伴侣称呼", placeholder: "例：娜娜 / 老王" },
      ]},
      { id: "highlight", label: "想纪念的瞬间 / 想表达的 *", type: "textarea", placeholder: "例：第一次一起爬泰山，今年陪我熬过最难的项目。" },
      { id: "tone", label: "基调", type: "select", options: ["温暖","俏皮","深情","简练"] },
    ],
  },
};

const $ = (id) => document.getElementById(id);
const tabsEl = $("tabs");
const formEl = $("form");
let currentKind = new URLSearchParams(location.search).get("kind") || "toast";
if (!KINDS[currentKind]) currentKind = "toast";

function renderTabs() {
  tabsEl.innerHTML = "";
  for (const [k, v] of Object.entries(KINDS)) {
    const b = document.createElement("button");
    b.textContent = v.label;
    if (k === currentKind) b.classList.add("active");
    b.onclick = () => { currentKind = k; history.replaceState(null,"",`?kind=${k}`); render(); };
    tabsEl.appendChild(b);
  }
}

function fieldHTML(f) {
  const id = f.id;
  if (f.type === "textarea") {
    return `<label>${f.label}</label><textarea id="${id}" maxlength="600" placeholder="${f.placeholder||''}"></textarea>`;
  }
  if (f.type === "select") {
    return `<label>${f.label}</label><select id="${id}">${f.options.map(o=>`<option value="${o}">${o}</option>`).join("")}</select>`;
  }
  const t = f.type || "text";
  return `<label>${f.label}</label><input id="${id}" type="${t}" maxlength="40" placeholder="${f.placeholder||''}" />`;
}

function renderForm() {
  const cfg = KINDS[currentKind];
  formEl.innerHTML = cfg.fields.map(item => {
    if (item.row) {
      return `<div class="row">${item.row.map(f=>`<div>${fieldHTML(f)}</div>`).join("")}</div>`;
    }
    return fieldHTML(item);
  }).join("");
  $("go").textContent = cfg.btn;
  $("resultTitle").textContent = cfg.title;
  $("resultCard").style.display = "none";
}

function render() { renderTabs(); renderForm(); }

function collectInputs() {
  const cfg = KINDS[currentKind];
  const data = { kind: currentKind };
  const collect = (f) => {
    const el = document.getElementById(f.id);
    if (el) data[f.id] = el.value.trim();
  };
  cfg.fields.forEach(item => item.row ? item.row.forEach(collect) : collect(item));
  return data;
}

async function gen() {
  const data = collectInputs();
  // 校验：必填项是带 * 的字段（story / highlight）
  const must = data.story || data.highlight;
  if (!must || must.length < 5) { alert("请至少填写带 * 的故事/亮点字段，5 字以上"); return; }
  const btn = $("go"); btn.disabled = true; const orig = btn.textContent; btn.textContent = "✨ AI 创作中…";
  $("resultCard").style.display = "block";
  $("out").textContent = "正在为你创作中…";
  try {
    const r = await fetch("/api/ai", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify(data),
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || "生成失败");
    $("out").textContent = d.text;
    $("ts").textContent = new Date().toLocaleTimeString() + (d.model ? ` · ${d.model}` : "");
  } catch(e) {
    $("out").textContent = "❌ " + e.message + "\n请稍后再试。";
  } finally {
    btn.disabled = false; btn.textContent = orig;
  }
}

$("go").onclick = gen;
$("regenBtn").onclick = gen;
$("copyBtn").onclick = async () => {
  await navigator.clipboard.writeText($("out").textContent);
  $("copyBtn").textContent = "✅ 已复制";
  setTimeout(() => $("copyBtn").textContent = "📋 复制", 1500);
};
$("shareBtn").onclick = async () => {
  const text = $("out").textContent;
  if (navigator.share) {
    try { await navigator.share({ title: KINDS[currentKind].title, text, url: location.href }); } catch{}
  } else {
    await navigator.clipboard.writeText(text + "\n\n— 由 wedding-tv.cn AI 生成");
    alert("已复制到剪贴板");
  }
};

render();
</script>
