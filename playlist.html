function searchUrl(platform,q){
  const e=encodeURIComponent(q);
  return platform==="netease"?`https://music.163.com/#/search/m/?s=${e}`
    :platform==="qq"?`https://y.qq.com/n/ryqq/search?w=${e}`
    :`https://open.spotify.com/search/${e}`;
}
const $=id=>document.getElementById(id);
function render(activeId){
  $("tabs").innerHTML=PLAYLIST.map(p=>`<button class="tab ${p.id===activeId?'active':''}" data-id="${p.id}">${p.name}</button>`).join("");
  document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>render(b.dataset.id));
  const sec=PLAYLIST.find(p=>p.id===activeId);
  $("content").innerHTML=`<div class="section">
    <h2>${sec.name}</h2>
    <p class="scene-tip">${sec.tip}</p>
    ${sec.songs.map(s=>{
      const q=`${s.t} ${s.a}`;
      return `<div class="song"><div class="meta"><div class="title">${s.t}<span class="lang">${s.l}</span></div><div class="artist">${s.a}</div></div><div class="links">
        <a href="${searchUrl('netease',q)}" target="_blank" rel="noopener">网易云</a>
        <a href="${searchUrl('qq',q)}" target="_blank" rel="noopener">QQ音乐</a>
        <a href="${searchUrl('spotify',q)}" target="_blank" rel="noopener">Spotify</a>
      </div></div>`;
    }).join("")}
  </div>`;
}
