<script>
const $ = (id) => document.getElementById(id);
const STORAGE_KEY = "checklist_state_v1";

function renderMarkdown(md){
  // 简易渲染：## 标题 + - [ ] / - [x] 任务
  const lines = md.split(/\r?\n/);
  let html = "", inUl = false;
  const closeUl = () => { if (inUl){ html += "</ul>"; inUl = false; } };
  for (const raw of lines){
    const line = raw.trim();
    if (!line){ closeUl(); continue; }
    if (line.startsWith("## ")){ closeUl(); html += `<h2>${escape(line.slice(3))}</h2>`; continue; }
    const m = /^[-*]\s*\[( |x|X)\]\s*(.+)$/.exec(line) || /^[-*]\s+(.+)$/.exec(line);
    if (m){
      if (!inUl){ html += "<ul>"; inUl = true; }
      const checked = m[1] === "x" || m[1] === "X";
      const txt = m[2] || m[1];
      html += `<li><input type="checkbox" ${checked?"checked":""}/><span>${escape(txt)}</span></li>`;
      continue;
    }
    closeUl(); html += `<div>${escape(line)}</div>`;
  }
  closeUl();
  return html;
}
function escape(s){ return s.replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

function bindCheckboxes(){
  const state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
  document.querySelectorAll(".out li").forEach((li, i) => {
    const cb = li.querySelector("input");
    const txt = li.querySelector("span").textContent;
    const k = txt;
    if (state[k]) { cb.checked = true; li.classList.add("done"); }
    cb.addEventListener("change", () => {
      li.classList.toggle("done", cb.checked);
      const cur = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
      if (cb.checked) cur[k] = 1; else delete cur[k];
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cur));
      updateProgress();
    });
  });
  updateProgress();
}
function updateProgress(){
  const all = document.querySelectorAll(".out li input").length;
  const done = document.querySelectorAll(".out li input:checked").length;
  $("progress").textContent = all ? `已完成 ${done}/${all}` : "";
}

async function gen(){
  const city = $("city").value.trim();
  const date = $("date").value;
  if (!city || !date) { alert("请填写城市与婚期"); return; }
  const btn = $("go"); btn.disabled = true; btn.textContent = "✨ AI 规划中…";
  $("resultCard").style.display = "block";
  $("out").innerHTML = "<div style='color:var(--sub)'>正在为你定制清单…</div>";
  try {
    const r = await fetch("/api/ai", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({
        kind: "checklist",
        city, date,
        budget: $("budget").value,
        guests: $("guests").value,
        style: $("style").value,
      })
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || "生成失败");
    $("out").innerHTML = renderMarkdown(d.text);
    sessionStorage.setItem("checklist_md", d.text);
    bindCheckboxes();
  } catch(e){
    $("out").innerHTML = "<div style='color:#ff6b9d'>❌ " + escape(e.message) + "</div>";
  } finally {
    btn.disabled = false; btn.textContent = "✨ 生成我的筹备清单";
  }
}
$("go").onclick = gen;
$("regenBtn").onclick = () => { localStorage.removeItem(STORAGE_KEY); gen(); };
$("copyBtn").onclick = async () => {
  await navigator.clipboard.writeText(sessionStorage.getItem("checklist_md") || $("out").innerText);
  $("copyBtn").textContent = "✅ 已复制";
  setTimeout(() => $("copyBtn").textContent = "📋 复制全文", 1500);
};
$("printBtn").onclick = () => window.print();
</script>
