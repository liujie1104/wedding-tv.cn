<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a0f2e"/>
      <stop offset="0.5" stop-color="#0e0a14"/>
      <stop offset="1" stop-color="#2a1838"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f4d4a0"/>
      <stop offset="1" stop-color="#d4a574"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#d4a574" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#d4a574" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="950" cy="180" r="280" fill="url(#glow)"/>
  <circle cx="200" cy="500" r="220" fill="url(#glow)" opacity="0.6"/>

  <!-- decorative ring -->
  <circle cx="600" cy="540" r="42" fill="none" stroke="url(#gold)" stroke-width="3"/>
  <circle cx="650" cy="540" r="42" fill="none" stroke="url(#gold)" stroke-width="3"/>

  <!-- domain title -->
  <text x="600" y="240" text-anchor="middle"
        font-family="-apple-system, 'Segoe UI', sans-serif"
        font-size="96" font-weight="800" fill="url(#gold)"
        letter-spacing="-2">wedding-tv.cn</text>

  <!-- tagline EN -->
  <text x="600" y="310" text-anchor="middle"
        font-family="-apple-system, 'Segoe UI', sans-serif"
        font-size="32" font-weight="500" fill="#f5f1ea" opacity="0.92">
    Premium domain for wedding video, livestream &amp; SaaS
  </text>

  <!-- tagline ZH -->
  <text x="600" y="370" text-anchor="middle"
        font-family="'PingFang SC','Microsoft YaHei',sans-serif"
        font-size="30" font-weight="400" fill="#b9b1a3">
    稀缺 婚礼 + 视频 / 直播 行业品牌域名 · 议价出售
  </text>

  <!-- pill: For Sale -->
  <g transform="translate(600 460)">
    <rect x="-130" y="-28" width="260" height="56" rx="28"
          fill="url(#gold)"/>
    <text x="0" y="6" text-anchor="middle"
          font-family="-apple-system, 'Segoe UI', sans-serif"
          font-size="22" font-weight="700" fill="#1a0f00"
          letter-spacing="2">FOR SALE · 议价出售</text>
  </g>

  <!-- footer URL -->
  <text x="600" y="610" text-anchor="middle"
        font-family="-apple-system, monospace"
        font-size="18" fill="#b9b1a3" opacity="0.7"
        letter-spacing="3">https://wedding-tv.cn</text>
</svg>
