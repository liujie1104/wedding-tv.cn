<script>
const $ = (id) => document.getElementById(id);
async function gen(){
  const story = $("story").value.trim();
  if (story.length < 5) { alert("请至少写 5 个字的故事"); return; }
  const btn = $("go"); btn.disabled = true; btn.textContent = "✨ AI 创作中…";
  $("resultCard").style.display = "block";
  $("out").textContent = "正在为你创作中…";
  try {
    const r = await fetch("/api/ai", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ kind: "vows", groom: $("groom").value, bride: $("bride").value, story, style: $("style").value })
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || "生成失败");
    $("out").textContent = d.text;
    $("ts").textContent = new Date().toLocaleTimeString();
  } catch(e){
    $("out").textContent = "❌ " + e.message + "\n请稍后再试。";
  } finally {
    btn.disabled = false; btn.textContent = "✨ 生成我的婚礼誓词";
  }
}
$("go").onclick = gen;
$("regenBtn").onclick = gen;
$("copyBtn").onclick = async () => {
  await navigator.clipboard.writeText($("out").textContent);
  $("copyBtn").textContent = "✅ 已复制";
  setTimeout(() => $("copyBtn").textContent = "📋 复制", 1500);
};
$("shareBtn").onclick = async () => {
  const text = $("out").textContent;
  if (navigator.share) {
    try { await navigator.share({ title: "我的婚礼誓词", text, url: location.href }); } catch{}
  } else {
    await navigator.clipboard.writeText(text + "\n\n— 由 wedding-tv.cn AI 生成");
    alert("已复制到剪贴板");
  }
};
</script>
