<div class="wrap">
  <h1>🖼️ AI 婚礼海报生成器</h1>
  <p class="lead">由通义万相 AI 驱动，1 分钟生成婚礼海报。可用作 Save the Date、请帖封面、朋友圈预告。完全免费。</p>

  <div class="card">
    <div class="row">
      <div><label>新郎名字</label><input id="groom" maxlength="20" placeholder="可选" /></div>
      <div><label>新娘名字</label><input id="bride" maxlength="20" placeholder="可选" /></div>
    </div>
    <div class="row">
      <div><label>婚期</label><input id="date" type="date" onclick="this.showPicker&&this.showPicker()" /></div>
      <div><label>场地（可选）</label><input id="venue" maxlength="40" placeholder="例：上海外滩源" /></div>
    </div>
    <label>风格</label>
    <select id="style">
      <option value="rose">🌹 玫瑰金 · 浪漫西式</option>
      <option value="ink">🀄 中式水墨 · 红金喜庆</option>
      <option value="forest">🌿 森林系 · 户外草坪</option>
      <option value="ocean">🌊 海滨日落</option>
      <option value="vintage">🍷 复古酒红 · Art Deco</option>
      <option value="modern">⬜ 现代简约 · 香槟金</option>
      <option value="cyber">🌌 未来感 · 霓虹紫青</option>
    </select>
    <label>额外色彩描述（可选，英文/中文都行）</label>
    <input id="color" maxlength="60" placeholder="例：with peony flowers / 加入牡丹元素" />

    <label>尺寸</label>
    <select id="size">
      <option value="portrait">📱 竖版 720×1280（朋友圈/请帖封面）</option>
      <option value="square">⬜ 方形 1024×1024（小红书/Ins）</option>
      <option value="landscape">🖥️ 横版 1280×720（电视屏/横幅）</option>
    </select>

    <button class="btn" id="go">✨ 生成海报（约 30-60 秒）</button>
    <div class="meta">完全免费 · 由通义万相 wanx2.1-turbo 驱动 · 每分钟最多 5 次</div>

    <div class="examples" style="margin-top:18px">
      <button data-ex="rose">🌹 浪漫玫瑰金</button>
      <button data-ex="ink">🀄 中式水墨</button>
      <button data-ex="forest">🌿 森系户外</button>
      <button data-ex="ocean">🌊 海边日落</button>

  </div>

<script>
const $ = (id) => document.getElementById(id);

document.querySelectorAll(".examples button").forEach(b => {
  b.onclick = () => { $("style").value = b.dataset.ex; };
});

const STAGE = $("stage");
let lastImageUrl = "";

function setProgress(text) {
  STAGE.innerHTML = `<div class="progress">${text}<br><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
}

async function gen() {
  const body = {
    groom: $("groom").value.trim(),
    bride: $("bride").value.trim(),
    date: $("date").value,
    venue: $("venue").value.trim(),
    style: $("style").value,
    color: $("color").value.trim(),
    size: $("size").value,
  };
  const btn = $("go"); btn.disabled = true; btn.textContent = "✨ AI 创作中…";
  $("resultCard").style.display = "block";
  $("toolbar").style.display = "none";
  setProgress("提交任务中…");
  try {
    const r = await fetch("/api/poster", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify(body),
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || "提交失败");
    setProgress("AI 正在绘制中（约 20-50 秒）");
    const url = await poll(d.taskId);
    showImage(url);
  } catch(e) {
    STAGE.innerHTML = `<div style="color:#ff6b9d;text-align:center">❌ ${e.message}<br><small>请稍后重试</small></div>`;
  } finally {
    btn.disabled = false; btn.textContent = "✨ 生成海报（约 30-60 秒）";
  }
}

async function poll(taskId) {
  const start = Date.now();
  while (Date.now() - start < 90_000) {
    await new Promise(r => setTimeout(r, 2500));
    const r = await fetch(`/api/poster?id=${encodeURIComponent(taskId)}`);
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || "查询失败");
    if (d.status === "SUCCEEDED") return d.imageUrl;
    if (d.status === "FAILED" || d.status === "CANCELED") throw new Error(d.error || "生成失败");
    setProgress(`AI 绘制中…（${d.status}，已等待 ${Math.round((Date.now()-start)/1000)}s）`);
  }
  throw new Error("超时，请重试");
}

async function showImage(url) {
  // 通过本站代理避免 OSS 跨域（同时供下载）
  lastImageUrl = url;
  const proxyView = `/api/poster-img?url=${encodeURIComponent(url)}`;
  const proxyDownload = `/api/poster-img?dl=1&name=wedding-poster-${Date.now()}.png&url=${encodeURIComponent(url)}`;
  STAGE.innerHTML = `<img id="poster" src="${proxyView}" alt="婚礼海报" />`;
  const dl = $("dlBtn");
  dl.href = proxyDownload;
  dl.download = `wedding-poster-${Date.now()}.png`;
  $("toolbar").style.display = "flex";
}

$("go").onclick = gen;
$("newBtn").onclick = gen;
</script>
