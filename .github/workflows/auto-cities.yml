name: auto-cities

on:
  schedule:
    # 每天 UTC 02:00 = 北京 10:00；每次 2 个城市，50 天填满 100 城
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      max_cities:
        description: '本次生成几个'
        required: false
        default: '2'

permissions:
  contents: write

concurrency:
  group: auto-cities
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install --quiet requests openai

      - name: Generate
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          MAX_CITIES: ${{ github.event.inputs.max_cities || '2' }}
        run: python scripts/auto_cities.py

      - name: Commit & push if changed
        run: |
          git config user.name "wedding-tv-bot"
          git config user.email "bot@wedding-tv.cn"
          git add -A
          if git diff --cached --quiet; then
            echo "No new city pages generated."
          else
            git commit -m "feat(cities): add city wedding guides $(date -u +%Y-%m-%d)"
            git push
          fi
