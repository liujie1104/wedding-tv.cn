name: auto-news

on:
  schedule:
    # UTC: 00:00/06:00/12:00 = 北京 08:00/14:00/20:00（每天 3 轮 × 2 篇 = 每天约 6 篇）
    - cron: '0 0,6,12 * * *'
  workflow_dispatch:
    inputs:
      max_articles:
        description: '本次最多生成几篇'
        required: false
        default: '2'

permissions:
  contents: write

concurrency:
  group: auto-news
  cancel-in-progress: false

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests openai

      - name: Run auto-news
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          MAX_ARTICLES: ${{ github.event.inputs.max_articles || '2' }}
        run: |
          python scripts/auto_news.py

      - name: Commit & push if changed
        run: |
          git config user.name "wedding-tv-bot"
          git config user.email "bot@wedding-tv.cn"
          git add -A
          if git diff --cached --quiet; then
            echo "No new articles generated."
          else
            git commit -m "feat(news): auto-publish $(date -u +%Y-%m-%dT%H:%MZ) hot wedding news"
            git push
          fi
