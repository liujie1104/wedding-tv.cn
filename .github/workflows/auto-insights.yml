name: auto-insights

on:
  schedule:
    # 每周一 UTC 01:00 = 北京周一 09:00
    - cron: '0 1 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-insights
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install --quiet requests openai

      - name: Generate weekly insight
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: python scripts/auto_insights.py

      - name: Commit & push if changed
        run: |
          git config user.name "wedding-tv-bot"
          git config user.email "bot@wedding-tv.cn"
          git add -A
          if git diff --cached --quiet; then
            echo "No new insight generated."
          else
            git commit -m "feat(insights): weekly deep-dive $(date -u +%Y-%m-%d)"
            git push
          fi
