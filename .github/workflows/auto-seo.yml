name: Auto SEO - Refresh Sitemap & Ping Search Engines

on:
  schedule:
    # 每天 UTC 02:00 = 北京时间 10:00
    - cron: '0 2 * * *'
  workflow_dispatch: # 允许手动触发
  push:
    branches: [main]
    paths:
      - 'blog/**'
      - 'sitemap.xml'

permissions:
  contents: write

jobs:
  refresh-sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update sitemap lastmod to today
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          sed -i -E "s|<lastmod>[0-9]{4}-[0-9]{2}-[0-9]{2}</lastmod>|<lastmod>${TODAY}</lastmod>|g" sitemap.xml
          echo "✓ Sitemap lastmod updated to $TODAY"

      - name: Regenerate RSS feed
        run: node scripts/gen-rss.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet sitemap.xml rss.xml; then
            echo "No changes"
          else
            git add sitemap.xml rss.xml
            git commit -m "chore(seo): auto-refresh sitemap & rss [skip ci]"
            git push
          fi

  notify-search-engines:
    runs-on: ubuntu-latest
    needs: refresh-sitemap
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract URLs from sitemap
        id: urls
        run: |
          grep -oP '(?<=<loc>)[^<]+' sitemap.xml > urls.txt
          echo "count=$(wc -l < urls.txt)" >> $GITHUB_OUTPUT
          echo "提取了 $(wc -l < urls.txt) 个 URL"

      - name: Submit to IndexNow (Bing/Yandex/Naver/Seznam)
        run: |
          KEY=$(cat .indexnow-key)
          URLS_JSON=$(jq -R . urls.txt | jq -s .)
          PAYLOAD=$(jq -n \
            --arg host "wedding-tv.cn" \
            --arg key "$KEY" \
            --arg keyLoc "https://wedding-tv.cn/${KEY}.txt" \
            --argjson urls "$URLS_JSON" \
            '{host: $host, key: $key, keyLocation: $keyLoc, urlList: $urls}')
          
          echo "Submitting to IndexNow API..."
          curl -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD" \
            -w "\nHTTP: %{http_code}\n"

      - name: Ping Google sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://wedding-tv.cn/sitemap.xml" \
            -w "Google ping: %{http_code}\n" || true

      - name: Ping Bing sitemap
        run: |
          curl -s "https://www.bing.com/ping?sitemap=https://wedding-tv.cn/sitemap.xml" \
            -w "Bing ping: %{http_code}\n" || true

      - name: Submit to Baidu (if token configured)
        if: ${{ env.BAIDU_PUSH_TOKEN != '' }}
        env:
          BAIDU_PUSH_TOKEN: ${{ secrets.BAIDU_PUSH_TOKEN }}
        run: |
          curl -X POST "http://data.zz.baidu.com/urls?site=https://wedding-tv.cn&token=${BAIDU_PUSH_TOKEN}" \
            -H "Content-Type: text/plain" \
            --data-binary @urls.txt \
            -w "\nBaidu push: %{http_code}\n"

      - name: Summary
        run: |
          echo "### 🤖 Auto SEO 提交完成" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Sitemap 已刷新 lastmod" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 已提交 ${{ steps.urls.outputs.count }} 个 URL 到 IndexNow" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 已 ping Google / Bing" >> $GITHUB_STEP_SUMMARY
          echo "- 时间：$(date -u +%Y-%m-%d\ %H:%M\ UTC)" >> $GITHUB_STEP_SUMMARY
