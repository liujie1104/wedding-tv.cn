      <div class="row">

<script>
const $ = (id) => document.getElementById(id);
const cv = $("cv"), ctx = cv.getContext("2d");
let userImg = null;
let style = "rose";

const THEMES = {
  rose:   { bg:["#2a0f1a","#7a1f3d","#b08545"], ink:"#fff8ec", accent:"#ffd28a", sub:"#f3c7d4", deco:"💍" },
  ink:    { bg:["#0c0c0c","#2a2118","#5a3e22"], ink:"#fff8e0", accent:"#d4a256", sub:"#c8b896", deco:"❤" },
  forest: { bg:["#0e2418","#1f5237","#7ab87a"], ink:"#f3ffe8", accent:"#fff7c2", sub:"#cfe9c0", deco:"🌿" },
  ocean:  { bg:["#0a1a2f","#13507a","#7ec5e6"], ink:"#f0fbff","accent":"#ffd9a8", sub:"#bfdcef", deco:"🌊" },
};

$("photo").onchange = (e) => {
  const f = e.target.files[0]; if (!f) return;
  const fr = new FileReader();
  fr.onload = () => { const img = new Image(); img.onload = () => { userImg = img; render(); }; img.src = fr.result; };
  fr.readAsDataURL(f);
};
$("styles").querySelectorAll("button").forEach(b => {
  b.onclick = () => { style = b.dataset.s; $("styles").querySelectorAll("button").forEach(x=>x.classList.remove("active")); b.classList.add("active"); render(); };
});
$("size").onchange = () => {
  const [w, h] = $("size").value.split("x").map(Number);
  cv.width = w; cv.height = h; render();
};
["groom","bride","date","tag"].forEach(id => $(id).addEventListener("input", render));
$("render").onclick = render;

function daysLeft(d){
  if (!d) return "—";
  const ms = new Date(d + "T00:00:00").getTime() - Date.now();
  return Math.max(0, Math.ceil(ms / 86400000));
}

function render(){
  const w = cv.width, h = cv.height;
  const t = THEMES[style];
  const ratio = w / h;
  const landscape = ratio > 1.2;
  const u = Math.min(w, h); // 统一尺度基准

  // 渐变背景
  const g = ctx.createLinearGradient(0, 0, landscape ? w : 0, h);
  g.addColorStop(0, t.bg[0]); g.addColorStop(0.55, t.bg[1]); g.addColorStop(1, t.bg[2]);
  ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);

  // 装饰圆光
  ctx.fillStyle = "rgba(255,255,255,0.04)";
  for (let i=0;i<6;i++){
    ctx.beginPath();
    ctx.arc(Math.random()*w, Math.random()*h, 80+Math.random()*200, 0, Math.PI*2);
    ctx.fill();
  }

  const groom = $("groom").value || "新郎";
  const bride = $("bride").value || "新娘";
  const days = daysLeft($("date").value);
  const tag = $("tag").value || "";

  if (landscape) {
    // 两栏：左头像 / 右文字
    const leftCx = w * 0.28, leftCy = h * 0.5, r = Math.min(w * 0.16, h * 0.32);
    drawAvatar(leftCx, leftCy, r, t);

    const rx = w * 0.58;
    ctx.textAlign = "left";
    ctx.fillStyle = t.ink;
    ctx.font = `bold ${Math.round(u*0.075)}px "Songti SC","STSong","SimSun",serif`;
    const namesY = h * 0.32;
    ctx.fillText(`${groom}`, rx, namesY);
    const gw = ctx.measureText(`${groom}`).width;
    ctx.fillStyle = t.accent; ctx.font = `${Math.round(u*0.06)}px serif`;
    ctx.fillText(" ❤ ", rx + gw, namesY);
    const hw = ctx.measureText(" ❤ ").width;
    ctx.fillStyle = t.ink; ctx.font = `bold ${Math.round(u*0.075)}px "Songti SC","STSong","SimSun",serif`;
    ctx.fillText(`${bride}`, rx + gw + hw, namesY);

    ctx.fillStyle = t.sub; ctx.font = `${Math.round(u*0.035)}px sans-serif`;
    ctx.fillText("距我们结婚还有", rx, h * 0.50);

    ctx.fillStyle = t.accent;
    ctx.font = `bold ${Math.round(u*0.22)}px -apple-system,sans-serif`;
    ctx.fillText(String(days), rx, h * 0.78);
    const dw = ctx.measureText(String(days)).width;
    ctx.fillStyle = t.ink; ctx.font = `${Math.round(u*0.05)}px sans-serif`;
    ctx.fillText("天", rx + dw + 12, h * 0.78);

    if (tag){
      ctx.fillStyle = t.sub; ctx.font = `${Math.round(u*0.028)}px sans-serif`;
      ctx.fillText(tag, rx, h * 0.90);
    }
  } else {
    // 競版 / 方版：上下布局
    const cx = w / 2, cy = h * 0.22, r = u * 0.18;
    drawAvatar(cx, cy, r, t);

    ctx.textAlign = "center";
    ctx.fillStyle = t.ink;
    ctx.font = `bold ${Math.round(u*0.075)}px "Songti SC","STSong","SimSun",serif`;
    const namesY = cy + r + u*0.10;
    ctx.fillText(`${groom}      ${bride}`, cx, namesY);
    ctx.fillStyle = t.accent; ctx.font = `${Math.round(u*0.06)}px serif`;
    ctx.fillText("❤", cx, namesY);

    ctx.fillStyle = t.sub; ctx.font = `${Math.round(u*0.035)}px sans-serif`;
    ctx.fillText("距我们结婚还有", cx, namesY + u*0.10);

    ctx.fillStyle = t.accent;
    ctx.font = `bold ${Math.round(u*0.22)}px -apple-system,sans-serif`;
    const daysY = namesY + u*0.32;
    ctx.fillText(String(days), cx, daysY);
    ctx.fillStyle = t.ink; ctx.font = `${Math.round(u*0.05)}px sans-serif`;
    ctx.textAlign = "left";
    ctx.fillText(" 天", cx + (String(days).length * u*0.06), daysY);

    if (tag){
      ctx.fillStyle = t.sub; ctx.font = `${Math.round(u*0.03)}px sans-serif`;
      ctx.textAlign = "center";
      ctx.fillText(tag, cx, h - u*0.10);
    }
  }

  // 水印
  ctx.fillStyle = "rgba(255,255,255,0.5)";
  ctx.font = `${Math.round(u*0.022)}px sans-serif`;
  ctx.textAlign = "right";
  ctx.fillText("由 wedding-tv.cn 制作", w - 20, h - 20);
}

function drawAvatar(cx, cy, r, t){
  if (userImg){
    ctx.save();
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.closePath(); ctx.clip();
    const s = Math.max((r*2)/userImg.width, (r*2)/userImg.height);
    const dw = userImg.width*s, dh = userImg.height*s;
    ctx.drawImage(userImg, cx-dw/2, cy-dh/2, dw, dh);
    ctx.restore();
    ctx.strokeStyle = t.accent; ctx.lineWidth = 6;
    ctx.beginPath(); ctx.arc(cx, cy, r+2, 0, Math.PI*2); ctx.stroke();
  } else {
    ctx.fillStyle = t.accent;
    ctx.font = `${r*1.2}px serif`;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(t.deco, cx, cy);
    ctx.textBaseline = "alphabetic";
  }
}

$("dlBtn").onclick = () => {
  cv.toBlob(b => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(b);
    a.download = `wedding-countdown-${Date.now()}.png`;
    a.click();
  });
};
$("copyBtn").onclick = async () => {
  try {
    const b = await new Promise(r => cv.toBlob(r));
    await navigator.clipboard.write([new ClipboardItem({ "image/png": b })]);
    $("copyBtn").textContent = "✅ 已复制";
    setTimeout(() => $("copyBtn").textContent = "📋 复制图片", 1500);
  } catch { alert("当前浏览器不支持复制图片，请改用下载"); }
};

// 初始化
const today = new Date(); today.setMonth(today.getMonth() + 3);
$("date").value = today.toISOString().slice(0,10);
render();
</script>
