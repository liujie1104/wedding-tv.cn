  <h1>🏙️ 城市婚礼预算参考库（2026）</h1>
  <p class="lead">以下为常见婚礼预算区间参考（不含蜜月），用于快速估算。实际价格受酒店档次、桌数、档期、摄影团队影响。</p>
  <div class="tools">
    <input id="q" type="search" placeholder="搜索城市，如 杭州 / 成都" />
    <select id="tier"><option value="all">全部能级</option><option value="一线">一线</option><option value="新一线">新一线</option><option value="二线">二线</option></select>
  </div>
  <div id="grid" class="grid"></div>

<script>
const DATA=[
{city:'北京',tier:'一线',low:120000,mid:180000,high:300000,tip:'酒店和摄影是大头，平日档期可降10-20%'},
{city:'上海',tier:'一线',low:130000,mid:200000,high:320000,tip:'外滩/市中心场地溢价明显'},
{city:'广州',tier:'一线',low:100000,mid:150000,high:260000,tip:'午宴常比晚宴更省'},
{city:'深圳',tier:'一线',low:110000,mid:170000,high:280000,tip:'摄影摄像套餐可打包谈价'},
{city:'杭州',tier:'新一线',low:90000,mid:140000,high:240000,tip:'避开国庆五一，档期性价比更高'},
{city:'成都',tier:'新一线',low:85000,mid:130000,high:220000,tip:'坝坝宴/酒店双方案可并行比价'},
{city:'重庆',tier:'新一线',low:80000,mid:120000,high:210000,tip:'车队与酒店套餐谈判空间大'},
{city:'武汉',tier:'新一线',low:75000,mid:115000,high:190000,tip:'摄影棚拍+外景混搭成本更稳'},
{city:'南京',tier:'新一线',low:85000,mid:125000,high:210000,tip:'淡季酒店常有厅费减免'},
{city:'西安',tier:'新一线',low:70000,mid:110000,high:180000,tip:'中式礼服租赁组合更划算'},
{city:'天津',tier:'二线',low:65000,mid:98000,high:160000,tip:'桌数控制在20桌以内最稳'},
{city:'青岛',tier:'二线',low:68000,mid:105000,high:170000,tip:'海景外拍旺季提前锁档'}
];
const fmt=n=>'¥'+Number(n).toLocaleString();
function render(){
 const q=(document.getElementById('q').value||'').trim();
 const tier=document.getElementById('tier').value;
 const list=DATA.filter(x=>(tier==='all'||x.tier===tier)&&(!q||x.city.includes(q)));
 document.getElementById('grid').innerHTML=list.map(x=>`<article class="card"><h3>${x.city} <small style="font-size:12px;color:#b9b1a3">${x.tier}</small></h3><div class="k"><span>轻量预算</span><b>${fmt(x.low)}</b></div><div class="k"><span>中位预算</span><b>${fmt(x.mid)}</b></div><div class="k"><span>品质预算</span><b>${fmt(x.high)}</b></div><div class="tip">建议：${x.tip}</div></article>`).join('');
}
['q','tier'].forEach(id=>document.getElementById(id).addEventListener('input',render));
render();
(function(){var hm=document.createElement('script');hm.src='https://hm.baidu.com/hm.js?1df8fda3d25e8df34a5c8e08f945e9fb';var s=document.getElementsByTagName('script')[0];s.parentNode.insertBefore(hm,s);}());
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));}
</script>
